<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega do Burguês - Gestão</title>
    <style>
        :root { --vinho: #800020; --vinho-escuro: #4a0404; --branco: #ffffff; --cinza: #f4f4f4; }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--branco); }
        
        header { background: var(--vinho); color: white; text-align: center; padding: 15px; }
        
        nav { display: flex; justify-content: center; background: var(--vinho-escuro); position: sticky; top: 0; z-index: 1000; }
        
        nav button { background: none; border: none; color: white; padding: 15px; cursor: pointer; font-weight: bold; flex: 1; }
        
        .container { padding: 15px; max-width: 1100px; margin: auto; }
        
        .tab-content { display: none; }
        .active { display: block; }
        
        form, .filtro-mes { 
            display: flex; gap: 10px; flex-wrap: wrap; 
            background: var(--cinza); padding: 15px; border-radius: 8px; margin-bottom: 20px; 
        }
        
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 120px; font-size: 16px; /* Evita zoom automático no iPhone */ }
        
        .btn-vinho { background: var(--vinho); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }

        /* TABELAS RESPONSIVAS */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 500px; }
        th { background: var(--vinho); color: white; padding: 12px; font-size: 14px; }
        td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        
        .btn-edit { background: #d4af37; color: white; border: none; padding: 6px; border-radius: 3px; margin-bottom: 5px; width: 100%; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 6px; border-radius: 3px; width: 100%; }

        /* CARDS DE LIQUIDEZ */
        .cards { display: flex; flex-direction: column; gap: 15px; }
        .card { padding: 20px; background: var(--vinho); color: white; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lucro { background: #28a745; }

        /* AJUSTES PARA TELAS MAIORES (PC) */
        @media (min-width: 768px) {
            .cards { flex-direction: row; }
            .btn-vinho { width: auto; padding: 10px 25px; }
            .btn-edit, .btn-del { width: auto; }
            table { min-width: 100%; }
        }
    </style>
</head>
<body>
    <header><h1>🍷 Adega do Burguês</h1></header>
    <nav>
        <button onclick="showTab('estoque')">Estoque</button>
        <button onclick="showTab('vendas')">Vendas</button>
        <button onclick="showTab('liquidez')">Liquidez</button>
    </nav>

    <div class="container">
        <section id="estoque" class="tab-content active">
            <h3>📦 Controle de Estoque</h3>
            <form onsubmit="adicionarOuEditarEstoque(event)">
                <input type="text" id="est-nome" list="produtos-existentes" placeholder="Nome do Produto" required>
                <datalist id="produtos-existentes"></datalist>
                <input type="number" id="est-qtd" placeholder="Qtd" required>
                <input type="number" step="0.01" id="est-custo" placeholder="Custo Unitário" required>
                <input type="text" id="est-nota" placeholder="Nota Fiscal">
                <button type="submit" id="btn-estoque-main" class="btn-vinho">Adicionar</button>
            </form>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Produto</th><th>Qtd</th><th>Custo</th><th>Nota</th><th>Ações</th></tr></thead>
                    <tbody id="lista-estoque"></tbody>
                </table>
            </div>
        </section>

        <section id="vendas" class="tab-content">
            <h3>💰 Cadastrar Venda</h3>
            <form onsubmit="cadastrarVenda(event)">
                <select id="venda-produto" required></select>
                <input type="number" id="venda-qtd" placeholder="Qtd" required>
                <input type="number" step="0.01" id="venda-preco" placeholder="Preço Venda" required>
                <input type="date" id="venda-data" required>
                <input type="text" id="venda-cliente" placeholder="Cliente">
                <button type="submit" class="btn-vinho">Salvar Venda</button>
            </form>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Data</th><th>Produto</th><th>Qtd</th><th>Cliente</th><th>Total</th></tr></thead>
                    <tbody id="lista-vendas"></tbody>
                </table>
            </div>
        </section>

        <section id="liquidez" class="tab-content">
            <h3>📈 Lucro Real</h3>
            <div class="filtro-mes">
                <input type="month" id="filtro-data-liquidez" onchange="calcularLiquidez()">
                <button onclick="limparFiltroLiquidez()" class="btn-vinho">Ver Tudo</button>
            </div>
            <div class="cards">
                <div class="card"><h4>Investido</h4><p id="liq-investido">R$ 0,00</p></div>
                <div class="card"><h4>Faturamento</h4><p id="liq-bruto">R$ 0,00</p></div>
                <div class="card lucro"><h4>Lucro Real</h4><p id="liq-lucro">R$ 0,00</p></div>
            </div>
        </section>
    </div>

    <script>
        let estoque = JSON.parse(localStorage.getItem('adega_estoque')) || [];
        let vendas = JSON.parse(localStorage.getItem('adega_vendas')) || [];
        let editandoIndex = null;

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            renderizarEstoque(); renderizarVendas(); calcularLiquidez();
        }

        function renderizarEstoque() {
            const lista = document.getElementById('lista-estoque');
            const datalist = document.getElementById('produtos-existentes');
            lista.innerHTML = ""; datalist.innerHTML = "";
            estoque.forEach((item, index) => {
                lista.innerHTML += `<tr><td>${item.nome}</td><td>${item.qtd}</td><td>R$ ${parseFloat(item.custo).toFixed(2)}</td><td>${item.nota}</td>
                <td><button class="btn-edit" onclick="prepararEdicao(${index})">Editar</button> <button class="btn-del" onclick="removerItem(${index})">Excluir</button></td></tr>`;
                datalist.innerHTML += `<option value="${item.nome}">`;
            });
            atualizarSelectVendas();
        }

        function adicionarOuEditarEstoque(e) {
            e.preventDefault();
            const nome = document.getElementById('est-nome').value;
            const qtd = parseInt(document.getElementById('est-qtd').value);
            const custo = parseFloat(document.getElementById('est-custo').value);
            const nota = document.getElementById('est-nota').value;

            if (editandoIndex !== null) {
                estoque[editandoIndex] = { nome, qtd, custo, nota };
                editandoIndex = null;
                document.getElementById('btn-estoque-main').innerText = "Adicionar";
            } else {
                const existente = estoque.find(i => i.nome.toLowerCase() === nome.toLowerCase());
                if (existente) { existente.qtd += qtd; existente.custo = custo; existente.nota = nota; }
                else { estoque.push({ nome, qtd, custo, nota }); }
            }
            salvar(); e.target.reset();
        }

        function prepararEdicao(index) {
            editandoIndex = index;
            const item = estoque[index];
            document.getElementById('est-nome').value = item.nome;
            document.getElementById('est-qtd').value = item.qtd;
            document.getElementById('est-custo').value = item.custo;
            document.getElementById('est-nota').value = item.nota;
            document.getElementById('btn-estoque-main').innerText = "Salvar";
            window.scrollTo(0,0);
        }

        function cadastrarVenda(e) {
            e.preventDefault();
            const idx = document.getElementById('venda-produto').value;
            const qtd = parseInt(document.getElementById('venda-qtd').value);
            const preco = parseFloat(document.getElementById('venda-preco').value);
            const data = document.getElementById('venda-data').value;
            if (idx !== "" && estoque[idx].qtd >= qtd) {
                vendas.push({ data, produto: estoque[idx].nome, quantidade: qtd, custoTotal: estoque[idx].custo * qtd, vendaTotal: preco * qtd, cliente: document.getElementById('venda-cliente').value });
                estoque[idx].qtd -= qtd;
                salvar(); e.target.reset();
            } else { alert("Estoque insuficiente!"); }
        }

        function calcularLiquidez() {
            const filtro = document.getElementById('filtro-data-liquidez').value;
            let c = 0, v = 0;
            vendas.filter(ven => !filtro || ven.data.startsWith(filtro)).forEach(ven => { c += ven.custoTotal; v += ven.vendaTotal; });
            document.getElementById('liq-investido').innerText = `R$ ${c.toFixed(2)}`;
            document.getElementById('liq-bruto').innerText = `R$ ${v.toFixed(2)}`;
            document.getElementById('liq-lucro').innerText = `R$ ${(v - c).toFixed(2)}`;
        }

        function limparFiltroLiquidez() { document.getElementById('filtro-data-liquidez').value = ""; calcularLiquidez(); }
        
        function atualizarSelectVendas() {
            const s = document.getElementById('venda-produto');
            s.innerHTML = '<option value="">Vinho...</option>';
            estoque.forEach((item, index) => s.innerHTML += `<option value="${index}">${item.nome} (${item.qtd})</option>`);
        }

        function renderizarVendas() {
            const l = document.getElementById('lista-vendas'); l.innerHTML = "";
            vendas.forEach(v => l.innerHTML += `<tr><td>${v.data}</td><td>${v.produto}</td><td>${v.quantidade}</td><td>${v.cliente}</td><td>R$ ${v.vendaTotal.toFixed(2)}</td></tr>`);
        }

        function removerItem(i) { if(confirm("Excluir?")) { estoque.splice(i, 1); salvar(); } }

        function salvar() {
            localStorage.setItem('adega_estoque', JSON.stringify(estoque));
            localStorage.setItem('adega_vendas', JSON.stringify(vendas));
            renderizarEstoque(); renderizarVendas(); calcularLiquidez();
        }

        window.onload = () => showTab('estoque');
    </script>
</body>
</html>
