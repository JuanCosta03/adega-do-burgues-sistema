<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adega do Burguês - Gestão Completa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍷 Adega do Burguês</h1>
    </header>
    
    <nav>
        <button onclick="showTab('estoque')">Estoque</button>
        <button onclick="showTab('vendas')">Vendas</button>
        <button onclick="showTab('liquidez')">Liquidez (Lucro)</button>
    </nav>

    <div class="container">
        <!-- ABA ESTOQUE -->
        <section id="estoque" class="tab-content active">
            <h2>📦 Controle de Estoque</h2>
            <form onsubmit="adicionarOuEditarEstoque(event)">
                <input type="text" id="est-nome" list="produtos-existentes" placeholder="Nome do Produto" required>
                <datalist id="produtos-existentes"></datalist>
                <input type="number" id="est-qtd" placeholder="Qtd" required>
                <input type="number" step="0.01" id="est-custo" placeholder="Custo Compra (Unitário)" required>
                <input type="text" id="est-nota" placeholder="Nota Fiscal">
                <button type="submit" id="btn-estoque-main" class="btn-vinho">Adicionar ao Estoque</button>
            </form>
            <table>
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Custo Unit.</th>
                        <th>Nota</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-estoque"></tbody>
            </table>
        </section>

        <!-- ABA VENDAS -->
        <section id="vendas" class="tab-content">
            <h2>💰 Cadastrar Venda</h2>
            <form onsubmit="cadastrarVenda(event)">
                <select id="venda-produto" required></select>
                <input type="number" id="venda-qtd" placeholder="Qtd Vendida" required>
                <input type="number" step="0.01" id="venda-preco" placeholder="Preço de Venda" required>
                <input type="date" id="venda-data" required>
                <input type="text" id="venda-cliente" placeholder="Nome do Cliente">
                <button type="submit" class="btn-vinho">Finalizar Venda</button>
            </form>
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Cliente</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="lista-vendas"></tbody>
            </table>
        </section>

        <!-- ABA LIQUIDEZ -->
        <section id="liquidez" class="tab-content">
            <h2>📈 Lucro Real (Sobra)</h2>
            <div class="filtro-mes">
                <label>Filtrar por Mês:</label>
                <input type="month" id="filtro-data-liquidez" onchange="calcularLiquidez()">
                <button onclick="limparFiltroLiquidez()" class="btn-vinho">Ver Tudo</button>
            </div>
            <div class="cards">
                <div class="card"><h3>Investido (Custo)</h3><p id="liq-investido">R$ 0,00</p></div>
                <div class="card"><h3>Faturamento</h3><p id="liq-bruto">R$ 0,00</p></div>
                <div class="card lucro"><h3>Lucro Líquido</h3><p id="liq-lucro">R$ 0,00</p></div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
